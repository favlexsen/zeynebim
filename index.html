<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeynebim</title>
    <style>
        /* Gece Mavisi Tema */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #0f172a, #1e293b); 
            color: #e2e8f0; 
            margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden; 
        }
        header { background: rgba(30, 41, 59, 0.8); padding: 25px; text-align: center; backdrop-filter: blur(10px); border-bottom: 1px solid #334155; }
        h1 { margin: 0; color: #f472b6; font-size: 2.5em; text-shadow: 0 0 10px rgba(244, 114, 182, 0.5); }
        #counter { color: #818cf8; font-weight: bold; margin: 15px; font-size: 1.2em; }
        
        nav { display: flex; justify-content: center; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        nav button { background: #334155; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; transition: 0.3s; border: 1px solid #475569; }
        nav button:hover { background: #475569; transform: scale(1.05); }
        
        .container { max-width: 700px; margin: 30px auto; padding: 30px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .section { display: none; animation: fadeIn 0.8s; }
        .section.active { display: block; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Kalp Yağmuru */
        .heart { position: fixed; color: #f472b6; font-size: 20px; z-index: 9999; pointer-events: none; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(100vh); opacity: 0; } }
    </style>
</head>
<body>

<audio id="bgMusic" src="muzik.mp3" loop></audio>

<header>
    <h1>Zeynebime...</h1>
    <div id="counter"></div>
    <nav>
        <button onclick="showSection('notlar')">Notlar</button>
        <button onclick="showSection('albumler')">Albümler</button>
        <button onclick="showSurprise()" style="background: #f472b6; color: #0f172a;">Bana Sürpriz Yap</button>
    </nav>
</header>

<div class="container">
    <div id="notlar" class="section active">
        <h2>Notlar</h2>
        <p>Koridorda ve bateriden gördüğüm günden bugüne... İyi ki varsın zeynebimmm &#10084;</p>
    </div>
    <div id="albumler" class="section">
        <h2>Albümler</h2>
        <p>Fotoğraflar burada olacak...</p>
    </div>
</div>

<script>
    // 1. Sayaç
    const startDate = new Date('2025-11-06');
    const diffDays = Math.ceil(Math.abs(new Date() - startDate) / (1000 * 60 * 60 * 24));
    document.getElementById('counter').innerText = diffDays + " gündür hayatımdasın, iyi ki varsın!";

    // 2. Müzik ve Kalp Başlatıcı
    window.addEventListener('click', () => {
        document.getElementById('bgMusic').play().catch(() => {});
        startHearts();
    }, { once: true });

    // 3. Sürpriz Butonu
    function showSurprise() {
        const msgs = [
            "Dünyadaki en güzel gülüşe sahipsin.",
            "Seninle geçirdiğim her saniye, en sevdiğim şarkıdan daha güzel.",
            "İyi ki karşıma çıkmışsın.",
            "İyi ki eşşeğimsinnn.",
            "Seni çok seviyorum baltanemmm<3.",
            "MMUAAAAAAHHHHHHHHH EHEHEHEH<3<3"
        ];
        alert(msgs[Math.floor(Math.random() * msgs.length)]);
    }

    // 4. Kalp Yağmuru Fonksiyonu
    function startHearts() {
        setInterval(() => {
            const h = document.createElement('div');
            h.innerHTML = '&#10084;';
            h.className = 'heart';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.top = '-20px';
            h.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 5000);
        }, 800);
    }

    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
